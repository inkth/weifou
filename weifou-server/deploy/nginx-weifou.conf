# 接入共享 oneclaw-nginx 的 weifou 配置片段(参考存档)。
# 实际部署时这两段 server 被并入 /opt/oneclaw-server/server/nginx.conf 的 http{} 内,
# 并在该文件 http{} 顶部加 upstream;同时把 oneclaw-nginx 容器接入 weifou-net 网络:
#   docker network connect weifou-net oneclaw-nginx
# 证书由 acme.sh(Let's Encrypt, webroot)签发到 /opt/oneclaw-server/server/certs/。

upstream weifou_server { server weifou-server:8080; keepalive 32; }

# —— HTTP:ACME 验证 + 跳 HTTPS ——————————————————————
server {
    listen 80;
    server_name api.weifou.com;

    location /.well-known/acme-challenge/ {
        # 复用已挂载的 certs 目录做 webroot,避免重建 oneclaw-nginx 容器。
        # host: /opt/oneclaw-server/server/certs/acme-webroot/.well-known/acme-challenge/
        root /etc/nginx/certs/acme-webroot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# —— HTTPS:对外提供 weifou API ————————————————————————
server {
    listen 443 ssl;
    http2 on;
    server_name api.weifou.com;

    ssl_certificate     /etc/nginx/certs/api.weifou.com.fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/api.weifou.com.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    location = /healthz {
        proxy_pass http://weifou_server/healthz;
        access_log off;
    }
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://weifou_server;
    }
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://weifou_server;
    }
    location / {
        proxy_pass http://weifou_server;
    }
}
